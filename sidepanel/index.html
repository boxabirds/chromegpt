<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChromeGPT</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>ChromeGPT</h1>
      <span id="status" class="disconnected">Disconnected</span>
      <button id="settings-btn" title="Settings">&#9881;</button>
    </header>

    <div id="settings-panel" class="hidden">
      <label>
        Model
        <input type="text" id="model" placeholder="o3">
      </label>
      <div class="settings-actions">
        <button id="save-settings">Save</button>
        <button id="connect-btn">Connect</button>
        <button id="new-thread-btn">New thread</button>
      </div>
    </div>

    <div id="messages">
      <div id="setup-guide" class="setup-guide">
        <div class="setup-title">Setup</div>
        <ol>
          <li>Install Codex CLI<br><code>npm install -g @openai/codex</code></li>
          <li>Log in<br><code>codex login</code></li>
          <li>Install native host<br><code>./install-host.sh &lt;extension-id&gt;</code></li>
          <li>Restart Chrome, then click Connect</li>
        </ol>
        <div class="setup-hint">Status will turn green when connected.</div>
      </div>
    </div>

    <div id="input-area">
      <textarea id="question" placeholder="Ask about this page…" rows="2"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
